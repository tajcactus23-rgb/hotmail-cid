name: Build Android APK

on:
  push:
    branches: [android]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-pip build-essential zlib1g-dev libncurses5-dev libncursesw5-dev libsqlite3-dev libffi-dev unzip
    
    - name: Install Python dependencies
      run: pip install buildozer
    
    - name: Build debug APK
      run: buildozer android debug
      env:
        ANDROID_HOME: /opt/android-sdk
        ANDROIDNDK: /opt/android-ndk
        ANDROIDSDK: /opt/android-sdk
        ANDROID_API: '29'
        NDKAPI: '21'
    
    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: hotmail-inboxer-apk
        path: bin/*.apk