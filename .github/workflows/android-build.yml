name: Build Android APK

on:
  push:
    branches: [main, android]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        submodules: false
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-pip build-essential git zip unzip openjdk-17-jdk libncurses6 libncurses5-dev libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libffi-dev libssl-dev zlib1g-dev libtool libtool-bin autoconf2.69 pkg-config m4
    
    - name: Accept Android licenses
      run: |
        yes | sdkmanager --licenses 2>/dev/null || true
    
    - name: Build APK
      env:
        JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
        ANDROID_HOME: /home/runner/android-sdk
        ANDROID_SDK_ROOT: /home/runner/android-sdk
        ANDROIDSDK: /home/runner/android-sdk
        AUTOCONF: /usr/bin/autoconf2.69
        AUTORECONF: /usr/bin/autoreconf2.69
      run: |
        mkdir -p $ANDROID_HOME/cmdline-tools
        cd $ANDROID_HOME/cmdline-tools
        curl -sL https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -o cmdline.zip
        unzip -q cmdline.zip
        if [ -d "cmdline-tools" ]; then mv cmdline-tools latest; fi
        chmod +x latest/bin/*
        # Accept all licenses properly
        mkdir -p $ANDROID_HOME/licenses
        echo -e "\n24333f8a63b6825ea9c5514f83c2829b004d1fee" > $ANDROID_HOME/licenses/android-sdk-license
        echo -e "\n84831b9409646a918e30573bab4c9c91346d8abd" >> $ANDROID_HOME/licenses/android-sdk-license
        echo -e "\nd975f751698a77b662f1254ddbeed3901e976f5a" >> $ANDROID_HOME/licenses/android-sdk-license
        echo -e "\n8933bad161af4178b1185d1a37fbf41ea5269c55" >> $ANDROID_HOME/licenses/android-sdk-license
        
        # Install build tools with proper SDK root
        yes | latest/bin/sdkmanager --sdk_root=$ANDROID_HOME "build-tools;34.0.0" "build-tools;35.0.0" "platforms;android-34" 2>/dev/null || true

        mkdir -p $ANDROID_HOME/tools/bin
        ln -sf $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager $ANDROID_HOME/tools/bin/sdkmanager
        
        # Install NDK (buildozer will use this)
        yes | latest/bin/sdkmanager "ndk;25.1.8937393" 2>/dev/null || true
        
        cd $GITHUB_WORKSPACE
        pip install buildozer cython
        
        rm -rf .buildozer
        
        # Use the SDK from the runner's environment
        sed -i '/android.ndk_path/d' buildozer.spec
        sed -i '/android.sdk_path/d' buildozer.spec
        
        # Remove libtool patching - it doesn't help
        # Build without debug flag
        buildozer android debug || buildozer android release
      timeout-minutes: 120
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: hotmail-inboxer-apk
        path: bin/*.apk
        retention-days: 7